name: Cortex Index

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Build Cortex index
        run: node dist/cli.js index . --out scl-index.json --no-progress

      - name: Upload index as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cortex-index
          path: scl-index.json
          retention-days: 30
